<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rebase History</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px;
    }
    h1 {
      font-size: 1.4rem;
      color: #333;
      margin-bottom: 12px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .toolbar label {
      font-size: 0.9rem;
      color: #555;
    }
    .toolbar select {
      font-size: 0.9rem;
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      cursor: pointer;
    }
    .chart-container {
      background: white;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      max-width: 1100px;
    }
    .summary-section {
      margin-top: 28px;
      max-width: 1100px;
    }
    .summary-section h2 {
      font-size: 1rem;
      color: #333;
      margin-bottom: 12px;
    }
    .summary-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .summary-controls label {
      font-size: 0.9rem;
      color: #555;
    }
    .summary-controls input[type="date"] {
      font-size: 0.9rem;
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
    }
    .summary-cards {
      display: flex;
      gap: 16px;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 20px 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      min-width: 180px;
    }
    .card .card-label {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 6px;
    }
    .card .card-value {
      font-size: 2rem;
      font-weight: 600;
      color: #333;
    }
    .card.failures .card-value { color: #e74c3c; }
    .card.success  .card-value { color: #2ecc71; }
  </style>
</head>
<body>
  <h1>Test Rebase History</h1>
  <div class="toolbar">
    <label for="yearSelect">Year:</label>
    <select id="yearSelect"></select>
  </div>
  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>

  <div class="summary-section">
    <h2>Range Summary</h2>
    <div class="summary-controls">
      <label for="startDate">From:</label>
      <input type="date" id="startDate">
      <label for="endDate">To:</label>
      <input type="date" id="endDate">
    </div>
    <div class="summary-cards">
      <div class="card failures">
        <div class="card-label">Test Failures</div>
        <div class="card-value" id="statFailures">—</div>
      </div>
      <div class="card success">
        <div class="card-label">Success Rate (rebased / failures)</div>
        <div class="card-value" id="statSuccessRate">—</div>
      </div>
    </div>
  </div>

  <script>
    // ---- DATA: replace this block with Python-generated output ----
    const CSV_DATA = [
      { Date: "2023-01-02", NumberOfFailedTests: 39, NumberOfTestsSuccessfullyRebased: 128, NumberOfTestsWithRebaseUnavailable: 17, NumberOfTestsWithFailedToUniquelyIdentifyChange: 8 },
      { Date: "2023-04-10", NumberOfFailedTests: 37, NumberOfTestsSuccessfullyRebased: 110, NumberOfTestsWithRebaseUnavailable: 11, NumberOfTestsWithFailedToUniquelyIdentifyChange: 2 },
      { Date: "2023-07-03", NumberOfFailedTests: 60, NumberOfTestsSuccessfullyRebased: 94, NumberOfTestsWithRebaseUnavailable: 15, NumberOfTestsWithFailedToUniquelyIdentifyChange: 2 },
      { Date: "2023-10-02", NumberOfFailedTests: 46, NumberOfTestsSuccessfullyRebased: 99, NumberOfTestsWithRebaseUnavailable: 25, NumberOfTestsWithFailedToUniquelyIdentifyChange: 4 },
      { Date: "2024-01-08", NumberOfFailedTests: 33, NumberOfTestsSuccessfullyRebased: 141, NumberOfTestsWithRebaseUnavailable: 31, NumberOfTestsWithFailedToUniquelyIdentifyChange: 4 },
      { Date: "2024-04-01", NumberOfFailedTests: 46, NumberOfTestsSuccessfullyRebased: 146, NumberOfTestsWithRebaseUnavailable: 14, NumberOfTestsWithFailedToUniquelyIdentifyChange: 9 },
      { Date: "2024-07-01", NumberOfFailedTests: 33, NumberOfTestsSuccessfullyRebased: 99, NumberOfTestsWithRebaseUnavailable: 15, NumberOfTestsWithFailedToUniquelyIdentifyChange: 1 },
      { Date: "2024-10-07", NumberOfFailedTests: 50, NumberOfTestsSuccessfullyRebased: 80, NumberOfTestsWithRebaseUnavailable: 17, NumberOfTestsWithFailedToUniquelyIdentifyChange: 3 },
    ];
    // ---- END DATA ----

    const SERIES = [
      { key: "NumberOfFailedTests",                          label: "Failed",               color: "#e74c3c" },
      { key: "NumberOfTestsSuccessfullyRebased",             label: "Successfully Rebased",  color: "#2ecc71" },
      { key: "NumberOfTestsWithRebaseUnavailable",           label: "Rebase Unavailable",    color: "#f39c12" },
      { key: "NumberOfTestsWithFailedToUniquelyIdentifyChange", label: "Failed to Uniquely Identify", color: "#9b59b6" },
    ];

    // Populate year dropdown (most recent first; default to latest year in data)
    const years = [...new Set(CSV_DATA.map(r => r.Date.slice(0, 4)))].sort((a, b) => b - a);
    const select = document.getElementById("yearSelect");
    years.forEach(y => {
      const opt = document.createElement("option");
      opt.value = y;
      opt.textContent = y;
      select.appendChild(opt);
    });

    function filteredData(year) {
      return CSV_DATA.filter(r => r.Date.startsWith(year));
    }

    const chart = new Chart(document.getElementById("chart"), {
      type: "line",
      data: {
        datasets: SERIES.map(s => ({
          label: s.label,
          data: filteredData(years[0]).map(r => ({ x: r.Date, y: r[s.key] })),
          borderColor: s.color,
          backgroundColor: s.color + "22",
          borderWidth: 2,
          pointRadius: 3,
          tension: 0.3,
          fill: false,
        }))
      },
      options: {
        responsive: true,
        interaction: {
          mode: "index",
          intersect: false,
        },
        plugins: {
          legend: { position: "top" },
          tooltip: { mode: "index" },
        },
        scales: {
          x: {
            type: "time",
            time: { unit: "month", tooltipFormat: "yyyy-MM-dd" },
            title: { display: true, text: "Date" },
          },
          y: {
            beginAtZero: true,
            title: { display: true, text: "Number of Tests" },
          }
        }
      }
    });

    select.addEventListener("change", () => {
      const rows = filteredData(select.value);
      chart.data.datasets.forEach((ds, i) => {
        ds.data = rows.map(r => ({ x: r.Date, y: r[SERIES[i].key] }));
      });
      chart.update();
    });

    // ---- Range summary ----
    const startInput = document.getElementById("startDate");
    const endInput   = document.getElementById("endDate");

    // Default range: full extent of the data
    startInput.value = CSV_DATA[0].Date;
    endInput.value   = CSV_DATA[CSV_DATA.length - 1].Date;

    function updateSummary() {
      const start = startInput.value;
      const end   = endInput.value;
      const rows  = CSV_DATA.filter(r => r.Date >= start && r.Date <= end);

      const failures = rows.reduce((s, r) => s + r.NumberOfFailedTests, 0);
      const rebased  = rows.reduce((s, r) => s + r.NumberOfTestsSuccessfullyRebased, 0);
      const rate     = failures === 0 ? "N/A" : (rebased / failures * 100).toFixed(1) + "%";

      document.getElementById("statFailures").textContent    = failures;
      document.getElementById("statSuccessRate").textContent = rate;
    }

    updateSummary();
    startInput.addEventListener("change", updateSummary);
    endInput.addEventListener("change", updateSummary);
  </script>
</body>
</html>
